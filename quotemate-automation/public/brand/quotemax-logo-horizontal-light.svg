<svg xmlns="http://www.w3.org/2000/svg" width="360" height="96" viewBox="0 0 360 96" role="img" aria-label="QuoteMax">
  <title>QuoteMax</title>
  <!-- Icon mark: orange tile + white Q (square corners, Maintain design system) -->
  <g transform="translate(8,20)">
    <rect width="56" height="56" fill="#FF5A1F"/>
    <g transform="scale(0.875)">
      <circle cx="31" cy="28" r="17" fill="#FFFFFF"/>
      <circle cx="31" cy="28" r="7.5" fill="#FF5A1F"/>
      <path d="M21 39 L37 39 L21 52 Z" fill="#FFFFFF"/>
    </g>
  </g>
  <!-- Wordmark: QUOTE navy + MAX burnt-orange, heavy uppercase (for light surfaces) -->
  <text x="84" y="64" font-family="Manrope, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Arial, sans-serif" font-size="46" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#0E1622">QUOTE</tspan><tspan fill="#B23A0B">MAX</tspan>
  </text>
</svg>
